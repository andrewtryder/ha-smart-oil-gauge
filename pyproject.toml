[tool.pytest.ini_options]
testpaths = [
    "tests",
]
asyncio_mode = "auto"
addopts = "--cov=custom_components/smart_oil_gauge --cov-report=term-missing"
pythonpath = [
    ".",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "C",
    "B",
    "D",
]
ignore = []

[tool.ruff.lint.isort]
combine-as-imports = true

[tool.ruff.lint.pydocstyle]
convention = "google"
